<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="notes-title">81410343课程心得 - 儿童游戏乐园</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/notes.css">
    <link rel="stylesheet" href="css/language.css">
</head>
<body>
    <header class="game-header">
        <a href="index.html" class="back-btn" data-i18n="back-home">返回首页</a>
        <h1 data-i18n="notes-title">81410343课程心得</h1>
        <div class="header-actions">
            <button id="saveBtn" class="action-btn save-btn" data-i18n="save">保存</button>
            <button id="clearBtn" class="action-btn clear-btn" data-i18n="clear">清除</button>
        </div>
    </header>

    <main class="main-content">
        <div class="notes-container">
            <div class="note-input-section">
                <h2 data-i18n="my-notes">我的心得</h2>
                <textarea id="noteInput" data-i18n="notes-placeholder" placeholder="在这里写下你的课程心得..." rows="15"></textarea>
                <div class="input-actions">
                    <span id="charCount">0 <span data-i18n="chars">字</span></span>
                    <span id="lastSaved" data-i18n="not-saved">尚未保存</span>
                </div>
            </div>

            <div class="notes-history">
                <h2 data-i18n="history">历史记录</h2>
                <div id="notesList" class="notes-list">
                    <p class="empty-message" data-i18n="no-notes">暂无保存的记录</p>
                </div>
            </div>
        </div>
    </main>

    <div class="modal" id="saveModal">
        <div class="modal-content">
            <h2 data-i18n="save-success">保存成功!</h2>
            <p data-i18n="save-msg">你的心得已保存到本地</p>
            <button id="closeModalBtn" class="action-btn" data-i18n="confirm">确定</button>
        </div>
    </div>

    <script src="js/translations.js"></script>
    <script src="js/notes.js"></script>
    <script>
        document.body.appendChild(createLanguageToggle());
        updatePageContent();
    </script>
</body>
</html>
